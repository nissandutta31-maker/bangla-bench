name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Smoke tests (no API calls)
      run: python3 test_smoke.py

    - name: Silent-failure detector tests (no API calls)
      run: python3 test_silent_failure.py

  inspect-import:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install inspect-ai track
      run: pip install -r requirements-inspect.txt

    - name: Import smoke (task + scorer, no API calls)
      run: python3 test_inspect_import.py
